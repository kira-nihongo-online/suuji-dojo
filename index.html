<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>数字道場</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      background: #f0f8ff;
    }
    label {
      display: block;
      margin-top: 10px;
    }
    input[type="number"] {
      width: 120px;
    }
    button {
      margin-top: 15px;
      padding: 8px 16px;
    }
    #result {
      margin-top: 20px;
      font-size: 1.2em;
      background: #fff;
      padding: 10px;
      border-radius: 8px;
    }
    .number-line {
      margin: 6px 0;
      padding: 6px;
      border-bottom: 1px dashed #ccc;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .kana {
      color: #0066cc;
      margin-left: 10px;
      font-family: "Hiragino Mincho ProN", "MS Mincho", "Yu Mincho", serif;
    }
  </style>
</head>
<body>
    <h1>🥋 数字道場</h1>

  <label>最小値: <input type="number" id="min" value="1"></label>
  <label>最大値: <input type="number" id="max" value="100000000"></label>
  <label>出力数: <input type="number" id="count" value="3"></label>
  <label><input type="checkbox" id="unique" checked> 重複なし</label>

  <button onclick="generateNumbers()">生成</button>

  <div id="result"></div>

  <script>
    function numberToKanji(num) {
      const units = ["", "万", "億"];
      const digits = ["", "一", "二", "三", "四", "五", "六", "七", "八", "九"];
      const smallUnits = ["", "十", "百", "千"];

      function convertChunk(n) {
        let str = "";
        const numStr = String(n).padStart(4, '0');
        for (let i = 0; i < 4; i++) {
          const d = parseInt(numStr[i]);
          const u = 3 - i;
          if (d === 0) continue;
          if (d === 1 && u !== 0) {
            str += smallUnits[u];
          } else {
            str += digits[d] + smallUnits[u];
          }
        }
        return str;
      }

      let result = "";
      const numStr = String(num).padStart(9, '0'); // 最大9桁（一億）
      const chunks = [
        parseInt(numStr.slice(0, 1)),       // 億
        parseInt(numStr.slice(1, 5)),       // 万
        parseInt(numStr.slice(5, 9))        // 下位
      ];

      chunks.forEach((chunk, i) => {
        if (chunk > 0) {
          result += convertChunk(chunk) + units[2 - i];
        }
      });

      return result || "零";
    }

    function speak(text) {
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "ja-JP";
      speechSynthesis.speak(utterance);
    }

    function generateNumbers() {
      const min = parseInt(document.getElementById('min').value);
      const max = parseInt(document.getElementById('max').value);
      const count = parseInt(document.getElementById('count').value);
      const unique = document.getElementById('unique').checked;

      let numbers = [];
      let attempts = 0;

      while (numbers.length < count && attempts < 10000) {
        const num = Math.floor(Math.random() * (max - min + 1)) + min;
        if (unique && numbers.includes(num)) {
          attempts++;
          continue;
        }
        numbers.push(num);
      }

      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = '';

      numbers.forEach(num => {
        const line = document.createElement('div');
        line.className = 'number-line';

        const label = document.createElement('label');
        label.textContent = num;

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';

        const kanaSpan = document.createElement('span');
        kanaSpan.className = 'kana';

        checkbox.addEventListener('change', () => {
          if (checkbox.checked) {
            const kanji = numberToKanji(num);
            kanaSpan.textContent = kanji;
            speak(kanji);
          } else {
            kanaSpan.textContent = '';
          }
        });

        line.appendChild(checkbox);
        line.appendChild(label);
        line.appendChild(kanaSpan);
        resultDiv.appendChild(line);
      });
    }
  </script>
</body>
</html>
